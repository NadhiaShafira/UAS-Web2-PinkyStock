<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 E-Inventory Pink Kawaii 🎀</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts untuk Font Imut Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFF0F5; /* Lavender Blush Pink */
        }
        /* Animasi rotasi imut untuk emoji */
        @keyframes custom-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .emoji-putar {
            animation: custom-spin 4s linear infinite;
            display: inline-block;
        }
    </style>
</head>
<body class="text-pink-700 selection:bg-pink-200">

    <!-- Kontainer Utama Vue -->
    <div id="app">
        <!-- Struktur Navigasi Atas (Navbar) Modern Nan Cantik -->
        <nav class="bg-white/80 backdrop-blur-md shadow-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-pink-100">
            <div class="flex items-center space-x-2">
                <span class="text-2xl emoji-putar">🌸</span>
                <h1 class="text-2xl font-bold tracking-wide text-pink-500 animate-pulse">PinkyStock~</h1>
            </div>
            
            <div class="space-x-4 flex items-center">
                <!-- Link Navigasi berbasis Vue Router -->
                <router-link to="/" class="hover:text-pink-400 font-bold transition-all duration-300">🏠 Beranda</router-link>
                
                <!-- Otomatis muncul di navbar jika admin sudah berhasil login -->
                <router-link v-if="isLoggedIn" to="/dashboard" class="hover:text-pink-400 font-bold transition-all duration-300">📊 Dashboard</router-link>
                
                <!-- Tombol Login / Logout Dinamis -->
                <router-link v-if="!isLoggedIn" to="/login" class="bg-pink-400 hover:bg-pink-500 text-white font-bold px-5 py-2 rounded-full shadow-lg hover:shadow-pink-200 transition-all duration-300 transform hover:scale-105">✨ Login Admin</router-link>
                <button v-else @click="logout" class="bg-rose-400 hover:bg-rose-500 text-white font-bold px-5 py-2 rounded-full shadow-lg hover:shadow-rose-200 transition-all duration-300 transform hover:scale-105">💖 Keluar (Logout)</button>
            </div>
        </nav>

        <!-- Tempat Halaman Berubah Secara Otomatis (SPA) -->
        <main class="container mx-auto p-6">
            <router-view></router-view>
        </main>
    </div>

    <!-- Pustaka Inti: Vue 3, Vue Router & Axios via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- File Logic/Komponen Aplikasi Kita -->
    <script src="app.js"></script>
</body>
</html>
